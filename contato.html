<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Lar Amigo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">🐾 Lar Amigo</div>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="adote.html">Adote</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h2>Entre em Contato</h2>
        <p style="text-align: center;">Mande uma mensagem para nós e tiraremos suas dúvidas.</p>

        <form>
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome">
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="text" id="telefone" name="telefone" placeholder="(61) 0000-0000">
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como podemos ajudar?"></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Enviar Mensagem</button>
        </form>
    </section>

    <section style="text-align: center;">
        <h3>Endereço</h3>
        <p>Rua dos Animais, 123 – Brasília, DF</p>
        <p>E-mail: contato@laramigo.org</p>
    </section>

    <footer>
        <p>&copy; 2025 Lar Amigo - Brasília, DF</p>
        <p>Telefone: (61) 0000-0000</p>
    </footer>

</body>
</html>
